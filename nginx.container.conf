# Container-internal HTTP server for auralee-code.ca public booking site.
# SSL termination is handled by the host nginx (outside Docker).
# Host nginx proxies plain HTTP to this container on port 80.
server {
    listen 80;
    server_name _;

    # Proxy all API calls to the bookit Spring Boot backend.
    # "bookit-app" resolves via Docker's internal DNS on fluxo-net.
    location /api/ {
        proxy_pass http://bookit-app:8383;
        proxy_http_version 1.1;
        proxy_set_header Host auralee.ca;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Serve the React SPA — all unmatched paths fall back to index.html.
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
